name: Build & Release

on:
  # Trigger on version tags (e.g. v0.0.1-alpha)
  push:
    tags:
      - 'v*'
  # Run CI on every PR targeting main so branch protection's required checks are populated
  pull_request:
    branches:
      - main
  # Allow manual runs from the Actions tab for testing without tagging
  workflow_dispatch:

permissions:
  contents: write  # needed to create GitHub Releases and upload assets

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact-glob: 'dist/*.AppImage'
            artifact-name: linux
          - os: windows-latest
            artifact-glob: 'dist/*.exe'
            artifact-name: windows
          - os: macos-latest
            artifact-glob: 'dist/*.dmg'
            artifact-name: macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build app
        run: npm run build

      # PR builds only run tests + vite build (fast). Native packaging
      # (electron-builder) and artifact upload run only on tag pushes so
      # CI on PRs stays fast and release builds still produce installers.
      - name: Package installer (Linux)
        if: matrix.os == 'ubuntu-latest' && startsWith(github.ref, 'refs/tags/v')
        run: npx electron-builder --linux --publish never

      - name: Package installer (Windows)
        if: matrix.os == 'windows-latest' && startsWith(github.ref, 'refs/tags/v')
        run: npx electron-builder --win --publish never

      - name: Package installer (macOS)
        if: matrix.os == 'macos-latest' && startsWith(github.ref, 'refs/tags/v')
        run: npx electron-builder --mac --publish never
        env:
          # No code signing for now — builds an unsigned DMG
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: mocquereau-${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-glob }}
          if-no-files-found: error
          retention-days: 30

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    # Only create a GitHub Release when triggered by a version tag push
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Mocquereau ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
          files: |
            artifacts/mocquereau-linux/*.AppImage
            artifacts/mocquereau-windows/*.exe
            artifacts/mocquereau-macos/*.dmg
